<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMail - Kariya Tetsu | YOIMI CAMERA</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #5cb85c;
            --border: #333333;
            --hover: #2a2a2a;
            --sidebar-width: 260px;
        }

        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .brand {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            transition: 0.3s;
            cursor: pointer;
        }

        .brand:hover {
            background: var(--hover);
        }

        .brand span {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            font-weight: normal;
            margin-top: 5px;
        }

        .nav-menu {
            padding: 20px 0;
            flex: 1;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .nav-item:hover {
            background-color: var(--hover);
        }

        .nav-item.active {
            background-color: var(--hover);
            border-left: 3px solid var(--accent);
            color: #fff;
        }

        .badge {
            background-color: var(--accent);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .user-profile {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #444;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .user-profile:hover .avatar img {
            filter: grayscale(0%);
        }

        .user-info {
            font-size: 12px;
        }

        .user-name {
            font-weight: bold;
            font-size: 14px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            min-width: 0;
        }

        .header {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            background: var(--bg-panel);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            margin: 0 20px;
        }

        .search-bar {
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(92, 184, 92, 0.3);
        }

        .logout-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 6px 15px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
            transition: 0.3s;
            white-space: nowrap;
        }

        .logout-btn:hover {
            color: #fff;
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Email List Area */
        .list-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .list-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            background: var(--bg-dark);
        }

        .email-list {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-dark);
        }

        .email-item {
            display: flex;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .email-item:hover {
            background-color: #1a1a1a;
        }

        .email-item.unread {
            background-color: #161a16;
            border-left: 3px solid var(--accent);
        }

        .email-item.active {
            background-color: #222;
        }

        .email-sender {
            width: 150px;
            font-weight: normal;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-muted);
        }

        .email-item.unread .email-sender {
            color: #fff;
            font-weight: bold;
        }

        .email-content {
            flex: 1;
            margin: 0 15px;
            overflow: hidden;
        }

        .email-subject {
            font-size: 14px;
            font-weight: normal;
            margin-bottom: 4px;
            color: #bbb;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-item.unread .email-subject {
            color: #fff;
            font-weight: bold;
        }

        .email-snippet {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-date {
            font-size: 11px;
            color: var(--text-muted);
            width: 60px;
            text-align: right;
        }

        /* Reply Indicator */
        .reply-mark {
            font-size: 12px;
            color: var(--accent);
            display: inline-flex;
            align-items: center;
        }

        /* Message View */
        .message-view {
            flex: 1.5;
            padding: 0;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .msg-view-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
        }

        .msg-view-empty i {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.2;
        }

        .msg-container {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
            display: none;
        }

        .msg-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        .msg-subject {
            font-size: 22px;
            font-weight: 300;
            margin: 0 0 20px 0;
            color: #fff;
            line-height: 1.4;
        }

        .msg-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .msg-meta strong {
            color: var(--text-main);
            font-weight: normal;
        }

        .msg-body {
            font-size: 15px;
            line-height: 1.8;
            color: #ccc;
            white-space: pre-line;
            margin-top: 30px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1500;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        @media (min-width: 1024px) {
            .list-panel {
                width: 400px;
                border-right: 1px solid var(--border);
            }
        }

        @media (max-width: 1023px) {
            body {
                position: relative;
            }

            .sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                transform: translateX(0);
            }

            .sidebar.active {
                transform: translateX(260px);
            }

            .menu-btn {
                display: block;
            }

            .search-container {
                margin: 0 10px;
            }

            .search-bar {
                font-size: 12px;
                padding: 6px 10px;
            }

            .message-view {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                border-left: none;
                display: none;
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .message-view.active {
                display: flex;
                transform: translateX(0);
            }

            .email-sender {
                width: 100px;
                font-size: 13px;
            }

            .email-subject {
                font-size: 13px;
            }

            .email-snippet {
                font-size: 11px;
            }

            .msg-container {
                padding: 25px;
            }

            .msg-subject {
                font-size: 20px;
            }
        }

        .back-btn {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(92, 184, 92, 0.1);
        }

        @media (max-width: 1023px) {
            .back-btn {
                display: inline-flex;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .msg-container.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        /* Mobile Scroll Hide Logic */
        @media (max-width: 1023px) {
            .header-left {
                transition: width 0.3s, opacity 0.3s, margin 0.3s, gap 0.3s;
                overflow: hidden;
            }

            .list-header {
                transition: max-height 0.3s, padding 0.3s, opacity 0.3s, border 0.3s;
                overflow: hidden;
                max-height: 60px;
            }

            body.scrolled-down .header-left {
                width: 0;
                opacity: 0;
                margin: 0;
                gap: 0;
            }

            body.scrolled-down .list-header {
                max-height: 0;
                padding-top: 0;
                padding-bottom: 0;
                opacity: 0;
                border: none;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="brand" onclick="location.reload()">
            YOIMI CAMERA
            <span>INTERNAL WEBMAIL PORTAL</span>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchFolder('inbox', this)">
                Inbox <span class="badge" id="inbox-badge">1</span>
            </div>
            <div class="nav-item" onclick="switchFolder('sent', this)">
                Sent Box
            </div>
            <div class="nav-item">Drafts</div>
            <div class="nav-item" onclick="switchFolder('trash', this)">Trash</div>
            <div class="nav-item"
                style="color: #d9534f; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; font-size: 11px; letter-spacing: 1px;">
                SYSTEM ALERTS</div>
        </div>
        <div class="user-profile">
            <div class="avatar"><img src="images/Kariya Tetsu.webp" alt="刈谷 哲"></div>
            <div class="user-info">
                <div class="user-name">刈谷 哲</div>
                <div style="color: var(--text-muted);">Web Administrator</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            </div>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search messages...">
            </div>
            <button class="logout-btn" onclick="window.location.href='login.html'">LOGOUT</button>
        </div>

        <div style="display: flex; flex: 1; overflow: hidden;">
            <div class="list-panel">
                <div class="list-header" id="current-folder-name">Inbox</div>
                <div class="email-list" id="email-list-container">
                    <!-- Dynamic Content Loading -->
                </div>
            </div>

            <div class="message-view" id="message-view-panel">
                <div class="msg-view-empty" id="empty-state">
                    <i>✉</i>
                    <p>メッセージを選択して表示します</p>
                </div>
                <div class="msg-container" id="msg-content">
                    <!-- Dynamic Message Loading -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const emails = [
            {
                id: 1,
                folder: 'inbox',
                sender: 'YOIMI System Daemon',
                email: 'daemon@yoimi.co.jp',
                date: '2016-10-27 02:49',
                subject: '【自動通知】クラウドストレージ エラーログ検出',
                snippet: '管理者権限(Admin Override)による全アセット削除コマンドが実行されましたが……',
                body: `刈谷様

YOIMI Cloud System において、異常な操作ログが検出されました。

[対象アカウント]
ID: Luminar85 (鳴海 朔様)

[エラー内容]
管理者権限(Admin Override)によるディレクトリ単位の全アセット削除コマンドが実行されましたが、一部の破損ファイルにおいてSyncError 0x8024401Cが発生し、プロセスが強制中断されました。

現在、該当フォルダにはプロセス中断により残存したファイルと、破損したファイルが存在しています。
至急、データベースの整合性チェックと、アカウントのアクセス状況の確認を推奨します。

-------------------------
<a href="narumi_cloud.html" style="color: #5cb85c; text-decoration: underline;">[ 管理者アクセスで該当データベースを確認 ]</a>
-------------------------
YOIMI CAMERA Cloud System
This is an automated message.`,
                unread: true,
                replied: false
            },
            {
                id: 2,
                folder: 'inbox',
                sender: '柴田 健吾',
                email: 'yoimicamera_shibata@yoimi.co.jp',
                date: '2016-10-25 09:30',
                subject: '鳴海先生の過去インタビュー記事の再公開について',
                snippet: '刈谷君 おはよう、柴田です。先日、店頭で「YOIMI Vision」Vol.34を手に……',
                body: `刈谷君
おはよう、柴田です。

先日、店頭で「YOIMI Vision」Vol.34を手に取ったお客様から、鳴海先生のインタビューをもう一度読みたいという声を複数いただきました。
先生の「Luminar 85mm」に対する独自の美学は、今読み返しても非常に興味深く、サイト上でもアーカイブとして再公開したいと考えています。

刈谷君、過去の誌面データをWeb用に整形し、公開の準備を進めておいてくれないか。
先生の弟子である星野君との対談形式になっているあの記事だ。

それから、明日の隣町の山での撮影だが、先生は今回のデータをそのまま君のクラウドに上げるのを楽しみにされているよ。
私も同行できれば良かったのだが、残念ながら明日は朝から用事がある。
先生と玲奈さん、そして星野君のサポートを、システム側からしっかり支えてあげてほしい。よろしく頼む。`,
                unread: false,
                replied: true
            },
            {
                id: 3,
                folder: 'sent',
                to: '柴田 健吾',
                email: 'yoimicamera_shibata@yoimi.co.jp',
                date: '2016-10-25 10:05',
                subject: 'Re: 鳴海先生の過去インタビュー記事の再公開について',
                snippet: '柴田店長 承諾いたしました。インタビュー記事については、すでに誌面スキャンデータから……',
                body: `柴田店長

承知いたしました。
インタビュー記事については、すでに誌面スキャンデータからテキストを抽出し、Webアーカイブとしてのレイアウト調整を完了しました。
鳴海さんの「道具への執着」は、デジタル化を急ぐ現代においてはある種のノスタルジーを感じさせますが、コンテンツとしての反響が高いのは理解できます。本日中にテスト公開用のURLを送付します。

明日、10月26日の撮影についても、YOIMI Cloudの同期設定はすべて完了しています。
山岳地帯の不安定な回線状況でも、優先的に鳴海さんのディレクトリへパケットが流れるよう最適化を施しました。

明日は現場でのデータ転送が完了次第、私の端末にも通知が来るようにしてあります。
システムは完璧です。`,
                unread: false
            },
            {
                id: 4,
                folder: 'inbox',
                sender: '三崎 愛観',
                email: 'yoimicamera_misaki@yoimi.co.jp',
                date: '2016-10-24 10:15',
                subject: '第2保管庫の湿度上昇の件',
                snippet: '刈谷さん お疲れ様です、メンテナンスの三崎です。昨日から第2保管庫の湿度センサー……',
                body: `刈谷さん
お疲れ様です、メンテナンスの三崎です。

昨日から第2保管庫の湿度センサーの値が、設定値をわずかに上回ったまま安定しません。
この部屋には鳴海先生のLuminar 85mmや、デリケートなオールドレンズを集中させているので、カビの発生が非常に心配です。

私が直接確認した限り、除湿機自体は稼働しているようなのですが、システム側の監視ログやセンサーの故障の可能性を一度確認していただけないでしょうか？
先生の大事なレンズに何かあったらと思うと、気が気ではありません。よろしくお願いします。`,
                unread: false,
                replied: true
            },
            {
                id: 5,
                folder: 'sent',
                to: '三崎 愛観',
                email: 'yoimicamera_misaki@yoimi.co.jp',
                date: '2016-10-24 11:42',
                subject: 'Re: 第2保管庫の湿度上昇の件',
                snippet: '三崎さん ログを確認しました。結論から言うと、センサーの故障ではなく、単なる……',
                body: `三崎さん

ログを確認しました。結論から言うと、センサーの故障ではなく、単なる閾値設定のミスマッチです。
先週のシステムアップデートの際、外部気温との連動アルゴリズムを微調整しましたが、第2保管庫の断熱特性を考慮しきれていなかったようです。

すでにリモートでパラメータを最適化し、除湿機の出力を8%引き上げました。あと30分もすれば規定値内に収まるはずです。
数値のみで判断せず、現場の違和感を報告してくれたのは助かりました。

鳴海さんのレンズについては、私のシステムが守りますのでご安心を。`,
                unread: false
            },
            {
                id: 6,
                folder: 'trash',
                sender: '堂島 剛',
                email: 't_dojima@dojima-holdings.co.jp',
                date: '2016-10-18 21:14',
                subject: 'システムに関する個人的な依頼',
                snippet: '刈谷君 先日は多忙な中、時間を作ってくれてありがとう。君のような優秀な技術者が……',
                body: `刈谷君

先日は多忙な中、時間を作ってくれてありがとう。
君のような若く優秀な技術者が地元の店を支えていることを、同じ経営者として非常に頼もしく思っているよ。

さて、例の「YOIMI Cloud」の件だが、先日会食の際にも少し触れた『特定の状況下における機材データの取り扱い』について、正式に君へ一任したい。

以前も伝えた通り、娘の玲奈は非常に繊細な立場で仕事をしている。
万が一、撮影現場等で予期せぬトラブルや、彼女のプライバシーに関わるような「不適切な記録」がサーバーに残った際、私の判断で即座にそれらを『整理』できる権限を、システム側に組み込んでおいてほしい。

柴田店長は職人気質で素晴らしい人物だが、時にその実直さがデジタル時代の柔軟な対応を妨げることもあるだろう。
君が独自の判断で動ける「窓口」を作っておくことは、店のリスク管理としても極めて合理的だ。

協力への『投資』については、君が将来設立を計画しているセキュリティ会社の準備金として、例の口座へ本日付で振り込みを完了させてある。詳細は次回の会合で詰めよう。

追記：
念のため、このメールは読み終えたらゴミ箱に入れておいてくれ。柴田とは付き合いが長く、彼が機械に疎いのはよく知っているが、万が一ということもある。用心に越したことはないからね。

玲奈のことも含め、よろしく頼む。`,
                unread: false
            },
            {
                id: 7,
                folder: 'sent',
                to: '柴田 健吾',
                email: 'yoimicamera_shibata@yoimi.co.jp',
                date: '2016-10-29 16:05',
                subject: '警察への対応とシステムの安全性について',
                snippet: '店長、刈谷です。荒谷という刑事からのメール、私も拝見しました。かなり高圧的な……',
                body: `店長、刈谷です。
荒谷という刑事からのメール、私も拝見しました。

かなり高圧的な文面ですが、決して屈しないでください。令状もない状態でのパスワード開示は、我々がお客様に約束している「情報の秘匿性」を根底から覆す行為です。一度でも安易な開示を行えば、ヨイミカメラの信頼は地に落ちます。

鳴海さんの作品を守れるのは、店長、貴方だけです。刑事の荒谷はあのような言い方をしていますが、法的には我々に非はありません。

私の構築したシステムは、管理者が口を割らない限り、警察の強引なハッキングも寄せ付けないように設計してあります。店長、先生の名誉のためにも、今は沈黙を守ってください。後のことは、すべて私が技術的にサポートします。`,
                unread: false,
                replied: false
            }
        ];

        let currentFolder = 'inbox';

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function renderList(folder) {
            currentFolder = folder;
            const container = document.getElementById('email-list-container');
            const items = emails.filter(e => e.folder === folder).sort((a, b) => new Date(b.date) - new Date(a.date));

            let folderTitle = "Inbox";
            if (folder === 'sent') folderTitle = "Sent Box";
            if (folder === 'trash') folderTitle = "Trash";
            document.getElementById('current-folder-name').innerText = folderTitle;

            container.innerHTML = items.map(e => `
                <div class="email-item ${e.unread ? 'unread' : ''}" onclick="showMessage(${e.id}, this)">
                    <div class="email-sender">${folder === 'inbox' ? e.sender : 'To: ' + (e.to || e.sender)}</div>
                    <div class="email-content">
                        <div class="email-subject">
                            ${e.replied ? '<span class="reply-mark">↩</span>' : ''}
                            ${e.subject}
                        </div>
                        <div class="email-snippet">${e.snippet}</div>
                    </div>
                    <div class="email-date">${e.date.split(' ')[0].substring(5)}</div>
                </div>
            `).join('');

            // Update Badge
            const unreadCount = emails.filter(e => e.folder === 'inbox' && e.unread).length;
            document.getElementById('inbox-badge').innerText = unreadCount;
            document.getElementById('inbox-badge').style.display = unreadCount > 0 ? 'inline-block' : 'none';
        }

        function showMessage(id, element) {
            const email = emails.find(e => e.id === id);
            if (!email) return;

            // Mark read
            if (email.unread) {
                email.unread = false;
                renderList(currentFolder);
            }

            // UI Highlight
            document.querySelectorAll('.email-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');

            const contentArea = document.getElementById('msg-content');
            const emptyState = document.getElementById('empty-state');

            emptyState.style.display = 'none';
            contentArea.classList.add('active');

            contentArea.innerHTML = `
                <button class="back-btn" onclick="closeMessage()">← Back to List</button>
                <div class="msg-header">
                    <h2 class="msg-subject">${email.subject}</h2>
                    <div class="msg-meta">
                        <div><strong>From:</strong> ${email.sender || '刈谷 哲 (Self)'} &lt;${email.folder === 'inbox' ? email.email : 'yoimicamera_kariya@yoimi.co.jp'}&gt;</div>
                        <div><strong>To:</strong> ${email.folder === 'inbox' ? '刈谷 哲 &lt;yoimicamera_kariya@yoimi.co.jp&gt;' : email.to + (email.email ? ' &lt;' + email.email + '&gt;' : '')}</div>
                        <div style="margin-top:10px;"><strong>Date:</strong> ${email.date}</div>
                    </div>
                </div>
                <div class="msg-body">${email.body.replace(/\n/g, '<br>')}</div>
            `;

            if (window.innerWidth < 1024) {
                document.getElementById('message-view-panel').classList.add('active');
            }
        }

        function closeMessage() {
            document.getElementById('message-view-panel').classList.remove('active');
        }

        function switchFolder(folder, el) {
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            el.classList.add('active');
            renderList(folder);

            // Close sidebar on mobile
            if (window.innerWidth < 1024) {
                toggleSidebar();
            }

            // Clear message view on desktop
            if (window.innerWidth >= 1024) {
                document.getElementById('empty-state').style.display = 'flex';
                document.getElementById('msg-content').classList.remove('active');
            }
        }

        // Init
        window.onload = () => {
            renderList('inbox');

            // Mobile Scroll Logic
            const emailList = document.getElementById('email-list-container');
            let lastScrollTop = 0;
            emailList.addEventListener('scroll', () => {
                if (window.innerWidth >= 1024) return;
                let st = emailList.scrollTop;
                if (st > lastScrollTop && st > 30) {
                    document.body.classList.add('scrolled-down');
                } else if (st < lastScrollTop) {
                    document.body.classList.remove('scrolled-down');
                }
                lastScrollTop = st;
            });
        };
    </script>
</body>

</html>
