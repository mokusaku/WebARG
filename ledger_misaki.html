            --bg-panel: #1e1e1e;
            --bg-row: #1a1a1a;
            --bg-row-alt: #222222;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #d9534f;
            --accent-dim: rgba(217, 83, 79, 0.15);
            --border: #333333;
            --hover: #2a2a2a;
            --returned-text: #555555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* ヘッダー */
        .top-bar {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand-logo {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #fff;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .brand-logo:hover {
            opacity: 0.7;
        }

        .brand-logo small {
            display: block;
            font-size: 9px;
            font-weight: normal;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .separator {
            width: 1px;
            height: 30px;
            background: var(--border);
        }

        .page-id {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .user-badge .name {
            color: #fff;
            font-weight: bold;
        }

        .back-link {
            font-size: 11px;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 6px 14px;
            border-radius: 4px;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .back-link:hover {
            background: var(--accent-dim);
            color: #fff;
        }

        /* メインコンテンツ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 30px 80px;
        }

        /* ページヘッダー */
        .ledger-header {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .ledger-header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #fff;
            margin-bottom: 8px;
        }

        .ledger-header p {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* 統計バー */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 18px 24px;
            min-width: 160px;
            flex: 1;
            transition: border-color 0.3s;
        }

        .stat-card:hover {
            border-color: #555;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 200;
            color: #fff;
        }

        .stat-value.accent {
            color: var(--accent);
        }

        /* フィルターバー */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-input {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
            transition: border-color 0.3s;
            width: 240px;
        }

        .filter-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(217, 83, 79, 0.2);
        }

        .filter-input::placeholder {
            color: #555;
        }

        .filter-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .filter-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        .filter-btn.active {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        /* テーブル */
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: var(--bg-panel);
            position: sticky;
            top: 0;
        }

        thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            user-select: none;
        }

        tbody tr {
            border-bottom: 1px solid #2a2a2a;
            transition: background 0.2s;
        }

        tbody tr:nth-child(even) {
            background: var(--bg-row-alt);
        }

        tbody tr:nth-child(odd) {
            background: var(--bg-row);
        }

        tbody tr:hover {
            background: #2e2e2e;
        }

        tbody td {
            padding: 12px 16px;
            white-space: nowrap;
            color: var(--text-main);
        }

        /* 管理番号のスタイル */
        .id-cell {
            font-family: "SF Mono", "Consolas", monospace;
            font-size: 12px;
            color: var(--accent);
            font-weight: bold;
        }

        /* 日付のスタイル */
        .date-cell {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* 機材名のスタイル */
        .equipment-cell {
            color: #ccc;
        }

        /* S/N のスタイル */
        .sn-cell {
            font-family: "SF Mono", "Consolas", monospace;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 返却済み（打ち消し線） */
        tr.returned td {
            color: var(--returned-text);
            text-decoration: line-through;
            text-decoration-color: #555;
        }

        tr.returned .id-cell {
            color: #4a3535;
        }

        tr.returned:hover {
            background: #252525;
        }

        /* ステータスバッジ */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none !important;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-returned {
            background: rgba(100, 100, 100, 0.15);
            color: #666;
            border: 1px solid rgba(100, 100, 100, 0.3);
            text-decoration: line-through !important;
        }

        /* フッター */
        .ledger-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        .ledger-footer .timestamp {
            font-family: "SF Mono", "Consolas", monospace;
        }

            .top-bar {

                gap: 12px;
                padding: 12px 16px;
            }

            .container {
                padding: 20px 12px 60px;
            }

            .stats-bar {
                flex-direction: column;
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-input {
                width: 100%;
            }

            .ledger-header h1 {
                font-size: 18px;
            }

            thead th,
            tbody td {
                padding: 10px 10px;
                font-size: 11px;
            }

            .stat-card {
                min-width: auto;
            }
        }

        /* アニメーション */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-wrapper {
            animation: fadeInUp 0.5s ease-out;
        }

        .stat-card {
            animation: fadeInUp 0.4s ease-out;
        }

        .stat-card:nth-child(2) { animation-delay: 0.05s; }
        .stat-card:nth-child(3) { animation-delay: 0.1s; }
        .stat-card:nth-child(4) { animation-delay: 0.15s; }
    </style>
</head>

            });

            tbody.innerHTML = filtered.map(r => `
                <tr class="${r.returned ? 'returned' : ''}">
                    <td class="id-cell">${r.id}</td>
                    <td class="date-cell">${r.date}</td>
                    <td>${r.name}</td>
                    <td class="equipment-cell">${r.equipment}</td>
                    <td class="sn-cell">${r.sn}</td>
                    <td><span class="status-badge ${r.returned ? 'status-returned' : 'status-active'}">${r.returned ? '返却済' : '預かり中'}</span></td>
                </tr>
            `).join('');

            // 統計の更新
            const activeCount = records.filter(r => !r.returned).length;
            const returnedCount = records.filter(r => r.returned).length;
            document.getElementById('stat-total').textContent = records.length;
            document.getElementById('stat-active').textContent = activeCount;
            document.getElementById('stat-returned').textContent = returnedCount;
        }

        function filterTable() {
            renderTable();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + filter).classList.add('active');
            renderTable();
        }

        // 初期表示
        renderTable();
    </script>
</body>

</html>
